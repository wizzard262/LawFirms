info:
  name: Create law firm
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseAddress}}/lawfirms"
  headers:
    - name: x-user-id
      value: aaaaaaaa-0000-0000-0000-000000000001
  body:
    type: json
    data: |-
      {
        "id": "dddddddd-0000-0000-0000-000000000001",
        "title": "Contract Agreement",
        "type": "Contract",
        "lawFirmId": "ffffffff-0000-0000-0000-000000000001",
        "uploadedBy": "aaaaaaaa-0000-0000-0000-000000000001",
        "uploadedAt": "2025-01-01T00:00:00Z",
        "createdBy": "aaaaaaaa-0000-0000-0000-000000000001"
      }
  auth: inherit

runtime:
  variables:
    - name: BaseAddress
      value: https://localhost:7113

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
